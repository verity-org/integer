name: PR Smoke Test

# Builds a representative subset of images locally (no push) to catch
# template/config breakage early. Two images are chosen to exercise the
# most common failure modes:
#   - golang:1.24-fips  → GOFIPS140 env var set, wolfi-base used (not wolfi-fips)
#   - node:22-dev       → dev variant with an expanded package set

on:
  pull_request:
    branches: [main]
    paths:
      - "images/*.yaml"
      - "images/_base/*.yaml"
      - "integer.yaml"
      - "internal/**"
      - "cmd/**"
      - ".github/workflows/build-image.yaml"
      - ".github/workflows/pr-test.yaml"

permissions:
  contents: read

jobs:
  smoke-test:
    name: "Smoke test ${{ matrix.image }}:${{ matrix.version }}-${{ matrix.type }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # GOFIPS140 native FIPS mode — uses wolfi-base with GOFIPS140=latest env
          - image: golang
            version: "1.24"
            type: fips
          # Dev variant — exercises the larger package set path
          - image: node
            version: "22"
            type: dev

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a90bcbc6539c36a85cdfeb73f7e2f433735f215b # v2.15.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install mise
        uses: step-security/mise-action@d65cf9dcb78b983ae2530c89fd28e72286713505 # v3.5.1
        with:
          install: true
          cache: true

      - name: Cache Go modules
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: |
            ~/dev/go/pkg/mod
            ~/.cache/go-build
          key: go-${{ runner.os }}-${{ hashFiles('go.sum') }}
          restore-keys: go-${{ runner.os }}-

      - name: Build integer CLI
        run: go build -o integer .

      - name: Generate apko config and build image (local, no push)
        run: |
          # Generate configs — absolute include: paths are embedded automatically.
          ./integer discover --gen-dir ./gen

          config="gen/${{ matrix.image }}/${{ matrix.version }}/${{ matrix.type }}.apko.yaml"
          if [ ! -f "$config" ]; then
            echo "Config not found: $config" >&2
            exit 1
          fi

          apko build \
            --arch amd64 \
            "$config" \
            "${{ matrix.image }}:smoke-test" \
            "$GITHUB_WORKSPACE/image.tar"

      - name: Scan with Trivy (zero-CVE gate)
        run: |
          trivy image \
            --exit-code 1 \
            --severity CRITICAL,HIGH,MEDIUM,LOW \
            --vuln-type os,library \
            --format json \
            --output trivy-report.json \
            --input image.tar
        continue-on-error: false

      - name: Upload Trivy report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: "trivy-${{ matrix.image }}-${{ matrix.version }}-${{ matrix.type }}"
          path: trivy-report.json
          retention-days: 7
