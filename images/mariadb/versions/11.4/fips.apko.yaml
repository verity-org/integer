include: ../../../_base/wolfi-fips.yaml

contents:
  packages:
    - mariadb-11.4
    - mariadb-11.4-client

entrypoint:
  command: mariadbd

work-dir: /var/lib/mysql

environment:
  MYSQL_UNIX_PORT: /var/run/mysqld/mysqld.sock
  MARIADB_AUTO_UPGRADE: "1"
  OPENSSL_MODULES: /usr/lib/ossl-modules
  OPENSSL_CONF: /etc/ssl/openssl-fips.cnf

paths:
  - path: /var/lib/mysql
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o700
  - path: /var/run/mysqld
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o755
  - path: /docker-entrypoint-initdb.d
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o755
