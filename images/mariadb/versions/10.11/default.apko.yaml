include: ../../../_base/wolfi-base.yaml

contents:
  packages:
    - mariadb-10.11
    - mariadb-10.11-client

entrypoint:
  command: mariadbd

work-dir: /var/lib/mysql

environment:
  MYSQL_UNIX_PORT: /var/run/mysqld/mysqld.sock
  MARIADB_AUTO_UPGRADE: "1"

paths:
  - path: /var/lib/mysql
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o700
  - path: /var/run/mysqld
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o755
  - path: /docker-entrypoint-initdb.d
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o755
