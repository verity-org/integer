include: ../../../_base/wolfi-fips.yaml

contents:
  packages:
    - haproxy-3.0
    - libssl3

entrypoint:
  command: haproxy -f /etc/haproxy/haproxy.cfg

environment:
  OPENSSL_MODULES: /usr/lib/ossl-modules
  OPENSSL_CONF: /etc/ssl/openssl-fips.cnf

paths:
  - path: /etc/haproxy
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o755
  - path: /var/lib/haproxy
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o755
  - path: /var/run/haproxy
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o755
