include: ../../../_base/wolfi-base.yaml

contents:
  packages:
    - haproxy-3.1
    - libssl3

entrypoint:
  command: haproxy -f /etc/haproxy/haproxy.cfg

paths:
  - path: /etc/haproxy
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o755
  - path: /var/lib/haproxy
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o755
  - path: /var/run/haproxy
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o755
