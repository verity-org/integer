include: ../../../_base/wolfi-base.yaml

contents:
  packages:
    - consul

entrypoint:
  command: consul agent

paths:
  - path: /consul/config
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o755
  - path: /consul/data
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o700
