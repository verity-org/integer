include: ../../../_base/wolfi-base.yaml

contents:
  packages:
    - grafana-11

entrypoint:
  command: /usr/bin/grafana server

environment:
  GF_PATHS_CONFIG: /etc/grafana/grafana.ini
  GF_PATHS_DATA: /var/lib/grafana
  GF_PATHS_LOGS: /var/log/grafana
  GF_PATHS_PLUGINS: /var/lib/grafana/plugins

paths:
  - path: /etc/grafana
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o755
  - path: /var/lib/grafana
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o755
  - path: /var/log/grafana
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o755
