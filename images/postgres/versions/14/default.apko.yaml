include: ../../../_base/wolfi-base.yaml

contents:
  packages:
    - postgresql-14
    - postgresql-14-client

entrypoint:
  command: postgres

work-dir: /var/lib/postgresql

environment:
  PGDATA: /var/lib/postgresql/data
  POSTGRES_HOST_AUTH_METHOD: scram-sha-256
  LANG: en_US.utf8
  PG_MAJOR: "14"

paths:
  - path: /var/lib/postgresql
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o700
  - path: /var/lib/postgresql/data
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o700
  - path: /var/run/postgresql
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o755
  - path: /docker-entrypoint-initdb.d
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o755
