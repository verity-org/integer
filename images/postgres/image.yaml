apiVersion: integer.verity.supply/v1alpha1
kind: ImageDefinition
name: postgres
description: "PostgreSQL — Copa leaves 167 unfixable CVEs (linux-libc-dev, binutils); Wolfi rebuild from source"
upstream:
  package: postgresql-17
versions:
  - version: "14"
    eol: "2026-11-12"
    tags: ["14"]
    types: [default, fips]
  - version: "15"
    eol: "2027-11-11"
    tags: ["15"]
    types: [default, fips]
  - version: "16"
    eol: "2028-11-09"
    tags: ["16"]
    types: [default, fips]
  - version: "17"
    eol: "2029-11-08"
    tags: ["17"]
    types: [default, fips]
  - version: "18"
    eol: "2030-11-14"
    latest: true
    tags: ["18", "latest"]
    types: [default, fips]
