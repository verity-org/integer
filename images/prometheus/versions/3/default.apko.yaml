include: ../../../_base/wolfi-base.yaml

contents:
  packages:
    - prometheus

entrypoint:
  command: /usr/bin/prometheus

paths:
  - path: /etc/prometheus
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o755
  - path: /prometheus
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o755
