include: ../../../_base/wolfi-base.yaml

contents:
  packages:
    - prometheus-alertmanager

entrypoint:
  command: /usr/bin/alertmanager

paths:
  - path: /etc/alertmanager
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o755
  - path: /alertmanager
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o755
