apiVersion: integer.verity.supply/v1alpha1
kind: ImageDefinition
name: helm
description: "Helm Kubernetes package manager — Copa can't patch Alpine-based official image; Wolfi rebuild"
upstream:
  package: helm
versions:
  - version: "3"
    tags: ["3"]
    types: [default]
  - version: "4"
    latest: true
    tags: ["4", "latest"]
    types: [default]
