name: rqlite
description: "rqlite distributed SQLite — Wolfi rebuild eliminates upstream CVEs"
upstream:
  package: rqlite

types:
  default:
    base: wolfi-base
    packages: ["rqlite"]
    entrypoint: /usr/bin/rqlited
    paths:
      - {path: /rqlite/file, type: directory, uid: 65532, gid: 65532, permissions: 0o755}

versions:
  "8":
    latest: true
