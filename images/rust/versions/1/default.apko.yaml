include: ../../../_base/wolfi-base.yaml

contents:
  packages:
    - rust
    - cargo

entrypoint:
  command: /usr/bin/rustc

work-dir: /app

environment:
  RUST_BACKTRACE: "1"
  CARGO_HOME: /usr/local/cargo
  PATH: /usr/local/cargo/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin

paths:
  - path: /app
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o755
  - path: /usr/local/cargo
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o755
