include: ../../../_base/wolfi-base.yaml

contents:
  packages:
    - influxdb

entrypoint:
  command: /usr/bin/influxd

paths:
  - path: /var/lib/influxdb2
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o755
  - path: /etc/influxdb2
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o755
