include: ../../../_base/wolfi-fips.yaml

contents:
  packages:
    - ruby-3.4
    - libstdc++

entrypoint:
  command: /usr/bin/ruby

work-dir: /app

paths:
  - path: /app
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o755
  - path: /usr/local/bundle
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o755

environment:
  BUNDLE_SILENCE_ROOT_WARNING: "1"
  BUNDLE_APP_CONFIG: /usr/local/bundle
  OPENSSL_MODULES: /usr/lib/ossl-modules
  OPENSSL_CONF: /etc/ssl/openssl-fips.cnf
