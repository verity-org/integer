apiVersion: integer.verity.supply/v1alpha1
kind: ImageDefinition
name: openjdk
description: "OpenJDK — drop-in for eclipse-temurin; Wolfi rebuild from source with <24hr CVE response"
upstream:
  package: openjdk-21
versions:
  - version: "17"
    eol: "2027-10-31"
    tags: ["17", "latest-17"]
    types: [default, jre, fips]
  - version: "21"
    eol: "2029-12-31"
    tags: ["21"]
    types: [default, jre, fips]
  - version: "25"
    eol: "2031-09-30"
    latest: true
    tags: ["25", "latest"]
    types: [default, jre, fips]
