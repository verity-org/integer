include: ../../../_base/wolfi-base.yaml

contents:
  packages:
    - openjdk-25
    - openjdk-25-default-jvm

entrypoint:
  command: /usr/bin/java

work-dir: /app

environment:
  JAVA_HOME: /usr/lib/jvm/java-25-openjdk
  PATH: /usr/lib/jvm/java-25-openjdk/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
  LANG: en_US.UTF-8

paths:
  - path: /app
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o755
