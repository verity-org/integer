include: ../../../_base/wolfi-fips.yaml

contents:
  packages:
    - openjdk-21
    - openjdk-21-default-jvm

entrypoint:
  command: /usr/bin/java

work-dir: /app

environment:
  JAVA_HOME: /usr/lib/jvm/java-21-openjdk
  PATH: /usr/lib/jvm/java-21-openjdk/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
  LANG: en_US.UTF-8
  OPENSSL_MODULES: /usr/lib/ossl-modules
  OPENSSL_CONF: /etc/ssl/openssl-fips.cnf
  # Tell the JVM to use the system FIPS provider
  JAVA_TOOL_OPTIONS: >-
    -Dcom.sun.net.ssl.checkRevocation=false
    -Djava.security.properties=/etc/java-21-openjdk/security/java.security.fips

paths:
  - path: /app
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o755
