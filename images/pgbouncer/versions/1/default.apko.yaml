include: ../../../_base/wolfi-base.yaml

contents:
  packages:
    - pgbouncer

entrypoint:
  command: pgbouncer /etc/pgbouncer/pgbouncer.ini

paths:
  - path: /etc/pgbouncer
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o755
  - path: /var/log/pgbouncer
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o755
