include: ../../../_base/wolfi-fips.yaml

contents:
  packages:
    - valkey-8.1

entrypoint:
  command: /usr/bin/valkey-server

environment:
  OPENSSL_MODULES: /usr/lib/ossl-modules
  OPENSSL_CONF: /etc/ssl/openssl-fips.cnf

paths:
  - path: /data
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o755
