include: ../../../_base/wolfi-base.yaml

contents:
  packages:
    - rabbitmq-server-4.0

entrypoint:
  command: rabbitmq-server

environment:
  RABBITMQ_HOME: /usr/lib/rabbitmq
  RABBITMQ_MNESIA_BASE: /var/lib/rabbitmq/mnesia
  RABBITMQ_LOG_BASE: /var/log/rabbitmq
  HOME: /var/lib/rabbitmq

paths:
  - path: /var/lib/rabbitmq
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o755
  - path: /var/log/rabbitmq
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o755
  - path: /etc/rabbitmq
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o755
