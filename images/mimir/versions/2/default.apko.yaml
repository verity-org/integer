include: ../../../_base/wolfi-base.yaml

contents:
  packages:
    - grafana-mimir

entrypoint:
  command: /usr/bin/mimir

paths:
  - path: /etc/mimir
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o755
  - path: /var/lib/mimir
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o755
