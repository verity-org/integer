include: ../../../_base/wolfi-base.yaml

contents:
  packages:
    - deno

entrypoint:
  command: /usr/bin/deno

work-dir: /app

environment:
  DENO_DIR: /deno-dir

paths:
  - path: /app
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o755
  - path: /deno-dir
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o755
