include: ../../../_base/wolfi-fips.yaml

contents:
  packages:
    - erlang-27

entrypoint:
  command: /usr/bin/erl

work-dir: /app

environment:
  OPENSSL_MODULES: /usr/lib/ossl-modules
  OPENSSL_CONF: /etc/ssl/openssl-fips.cnf

paths:
  - path: /app
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o755
