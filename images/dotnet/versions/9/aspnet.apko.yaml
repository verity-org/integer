include: ../../../_base/wolfi-base.yaml

contents:
  packages:
    - dotnet-9-runtime
    - aspnet-9-runtime

entrypoint:
  command: /usr/bin/dotnet

work-dir: /app

environment:
  DOTNET_RUNNING_IN_CONTAINER: "true"
  ASPNETCORE_URLS: http://+:8080

paths:
  - path: /app
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o755
