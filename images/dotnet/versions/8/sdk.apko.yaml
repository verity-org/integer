include: ../../../_base/wolfi-base.yaml

contents:
  packages:
    - dotnet-8
    - dotnet-8-sdk

entrypoint:
  command: /usr/bin/dotnet

work-dir: /app

environment:
  DOTNET_RUNNING_IN_CONTAINER: "true"
  DOTNET_USE_POLLING_FILE_WATCHER: "true"
  NUGET_XMLDOC_MODE: skip

paths:
  - path: /app
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o755
  - path: /root/.nuget
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o755
