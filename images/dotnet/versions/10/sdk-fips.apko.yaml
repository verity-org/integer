include: ../../../_base/wolfi-fips.yaml

contents:
  packages:
    - dotnet-10
    - dotnet-10-sdk

entrypoint:
  command: /usr/bin/dotnet

work-dir: /app

environment:
  DOTNET_RUNNING_IN_CONTAINER: "true"
  DOTNET_SYSTEM_GLOBALIZATION_INVARIANT: "false"
  OPENSSL_MODULES: /usr/lib/ossl-modules
  OPENSSL_CONF: /etc/ssl/openssl-fips.cnf

paths:
  - path: /app
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o755
