apiVersion: integer.verity.supply/v1alpha1
kind: ImageDefinition
name: dotnet
description: ".NET runtime and SDK — drop-in for dotnet/sdk, dotnet/runtime, dotnet/aspnet; Wolfi rebuild"
upstream:
  package: dotnet-9
versions:
  - version: "8"
    eol: "2026-11-10"
    tags: ["8", "latest-8"]
    types: [default, sdk, aspnet, sdk-fips]
  - version: "9"
    eol: "2026-05-12"
    tags: ["9"]
    types: [default, sdk, aspnet, sdk-fips]
  - version: "10"
    eol: "2028-11-14"
    latest: true
    tags: ["10", "latest"]
    types: [default, sdk, aspnet, sdk-fips]
