name: mariadb
description: "MariaDB database server — Wolfi rebuild eliminates persistent Debian CVEs"
upstream:
  package: "mariadb-{{version}}"

types:
  default:
    base: wolfi-base
    packages: ["mariadb-{{version}}"]
    entrypoint: mariadbd
    work-dir: /var/lib/mysql
    environment:
      MYSQL_UNIX_PORT: /var/run/mysqld/mysqld.sock
      MARIADB_AUTO_UPGRADE: "1"
    paths:
      - {path: /var/lib/mysql, type: directory, uid: 65532, gid: 65532, permissions: 0o700}
      - {path: /var/run/mysqld, type: directory, uid: 65532, gid: 65532, permissions: 0o755}
      - {path: /docker-entrypoint-initdb.d, type: directory, uid: 65532, gid: 65532, permissions: 0o755}

  fips:
    base: wolfi-fips
    packages: ["mariadb-{{version}}"]
    entrypoint: mariadbd
    work-dir: /var/lib/mysql
    environment:
      MYSQL_UNIX_PORT: /var/run/mysqld/mysqld.sock
      MARIADB_AUTO_UPGRADE: "1"
      OPENSSL_MODULES: /usr/lib/ossl-modules
      OPENSSL_CONF: /etc/ssl/openssl-fips.cnf
    paths:
      - {path: /var/lib/mysql, type: directory, uid: 65532, gid: 65532, permissions: 0o700}
      - {path: /var/run/mysqld, type: directory, uid: 65532, gid: 65532, permissions: 0o755}
      - {path: /docker-entrypoint-initdb.d, type: directory, uid: 65532, gid: 65532, permissions: 0o755}

versions:
  "10.11":
    eol: "2028-02-16"
  "11.4":
    eol: "2029-05-29"
  "11.8":
    eol: "2028-06-04"
    latest: true
