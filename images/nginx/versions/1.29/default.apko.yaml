include: ../../../_base/wolfi-base.yaml

contents:
  packages:
    - nginx-mainline

entrypoint:
  command: /usr/sbin/nginx -g "daemon off;"

environment:
  NGINX_VERSION: "1.29"

paths:
  - path: /var/cache/nginx
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o755
  - path: /var/log/nginx
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o755
  - path: /etc/nginx/conf.d
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o755
  - path: /usr/share/nginx/html
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o755
