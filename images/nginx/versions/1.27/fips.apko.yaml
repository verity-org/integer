include: ../../../_base/wolfi-fips.yaml

contents:
  packages:
    - nginx

entrypoint:
  command: /usr/sbin/nginx -g "daemon off;"

environment:
  NGINX_VERSION: "1.27"
  OPENSSL_MODULES: /usr/lib/ossl-modules
  OPENSSL_CONF: /etc/ssl/openssl-fips.cnf

paths:
  - path: /var/cache/nginx
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o755
  - path: /var/log/nginx
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o755
  - path: /etc/nginx/conf.d
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o755
  - path: /usr/share/nginx/html
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o755
