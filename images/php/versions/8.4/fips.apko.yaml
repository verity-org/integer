include: ../../../_base/wolfi-fips.yaml

contents:
  packages:
    - php-8.4
    - php-8.4-mbstring
    - php-8.4-openssl
    - php-8.4-curl
    - php-8.4-json

entrypoint:
  command: /usr/bin/php

work-dir: /app

environment:
  OPENSSL_MODULES: /usr/lib/ossl-modules
  OPENSSL_CONF: /etc/ssl/openssl-fips.cnf

paths:
  - path: /app
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o755
