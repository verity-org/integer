include: ../../../_base/wolfi-base.yaml

contents:
  packages:
    - php-8.2
    - php-8.2-fpm
    - php-8.2-mbstring
    - php-8.2-openssl
    - php-8.2-curl

    - php-8.2-pdo
    - php-8.2-pdo_mysql
    - php-8.2-pdo_pgsql

entrypoint:
  command: /usr/sbin/php-fpm8.3 -F

work-dir: /app

environment:
  PHP_INI_SCAN_DIR: /etc/php/8.3/fpm/conf.d

paths:
  - path: /app
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o755
  - path: /var/run/php
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o755
