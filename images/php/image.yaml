    types: [default, fpm, dev, fips]
  - version: "8.3"
    eol: "2027-12-31"
    tags: ["8.3"]
    types: [default, fpm, dev, fips]
  - version: "8.4"
    eol: "2028-12-31"
    tags: ["8.4"]
    types: [default, fpm, dev, fips]
  - version: "8.5"
    eol: "2029-12-31"
    latest: true
    tags: ["8.5", "latest"]
    types: [default, fpm, dev, fips]
