include: ../../../_base/wolfi-fips.yaml

contents:
  packages:
    - redis-6

entrypoint:
  command: /usr/bin/redis-server

environment:
  REDIS_VERSION: "7"
  OPENSSL_MODULES: /usr/lib/ossl-modules
  OPENSSL_CONF: /etc/ssl/openssl-fips.cnf

paths:
  - path: /data
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o755
