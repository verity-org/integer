include: ../../../_base/wolfi-base.yaml

contents:
  packages:
    - apache2
    - apache2-utils

entrypoint:
  command: httpd -DFOREGROUND

paths:
  - path: /var/www/html
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o755
  - path: /var/log/apache2
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o755
  - path: /var/run/apache2
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o755
