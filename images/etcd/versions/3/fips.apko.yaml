include: ../../../_base/wolfi-fips.yaml

contents:
  packages:
    - etcd

entrypoint:
  command: /usr/bin/etcd

environment:
  OPENSSL_MODULES: /usr/lib/ossl-modules
  OPENSSL_CONF: /etc/ssl/openssl-fips.cnf

paths:
  - path: /var/lib/etcd
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o700
