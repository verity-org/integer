include: ../../../_base/wolfi-base.yaml

contents:
  packages:
    - go-1.25
    - build-base

entrypoint:
  command: /usr/bin/go

work-dir: /go/src

environment:
  GOPATH: /go
  GOTOOLCHAIN: local
  # GOFIPS140=latest enables Go 1.24+ native FIPS 140-3 mode.
  # Programs built in this image will automatically use the FIPS-certified
  # crypto module — no BoringSSL fork or custom toolchain required.
  GOFIPS140: latest
  PATH: /go/bin:/usr/local/go/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin

paths:
  - path: /go
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o755
  - path: /go/src
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o755
