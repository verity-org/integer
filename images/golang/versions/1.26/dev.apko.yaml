include: ../../../_base/wolfi-dev.yaml

contents:
  packages:
    - go-1.26
    - build-base
    - git
    - curl
    - bash

entrypoint:
  command: /usr/bin/go

work-dir: /go/src

environment:
  GOPATH: /go
  PATH: /go/bin:/usr/local/go/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin

paths:
  - path: /go
    type: directory
    uid: 0
    gid: 0
    permissions: 0o755
  - path: /go/src
    type: directory
    uid: 0
    gid: 0
    permissions: 0o755
