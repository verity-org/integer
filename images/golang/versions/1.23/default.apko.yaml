include: ../../../_base/wolfi-base.yaml

contents:
  packages:
    - go-1.23
    - build-base

entrypoint:
  command: /usr/bin/go

work-dir: /go/src

environment:
  GOPATH: /go
  PATH: /go/bin:/usr/local/go/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin

paths:
  - path: /go
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o755
  - path: /go/src
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o755
