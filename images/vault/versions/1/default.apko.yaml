include: ../../../_base/wolfi-base.yaml

contents:
  packages:
    - vault

entrypoint:
  command: vault server

environment:
  VAULT_DEV_ROOT_TOKEN_ID: ""
  HOME: /home/vault

paths:
  - path: /vault/config
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o755
  - path: /vault/data
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o700
  - path: /vault/logs
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o755
  - path: /home/vault
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o755
