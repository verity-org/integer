include: ../../../_base/wolfi-fips.yaml

contents:
  packages:
    - vault

entrypoint:
  command: vault server

environment:
  VAULT_DEV_ROOT_TOKEN_ID: ""
  HOME: /home/vault
  OPENSSL_MODULES: /usr/lib/ossl-modules
  OPENSSL_CONF: /etc/ssl/openssl-fips.cnf

paths:
  - path: /vault/config
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o755
  - path: /vault/data
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o700
  - path: /vault/logs
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o755
  - path: /home/vault
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o755
